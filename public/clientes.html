            </div>

                        <div class="bg-blue-100/10 p-2 rounded-full w-9 h-9">

                    <button class="flex items-center gap-2 md:hidden" id="btnHamburguer">

        <!-- MOBILE -->

                <li class="text-gray-500 border-b-1 border-gray-700 p-2"><a href="clientes.html">Clientes</a></li>
                <li class="text-gray-500 border-b-1 border-gray-700 p-2"><a href="usuarios.html">Usuários</a></li>

        <!-- TABLET E DESKTOP -->
         <div>
            <ul class="hidden md:flex md:gap-10 md:p-3">

                <a href="index.html"
                    class="text-gray-500
                            hover:text-blue-500

                            font-bold">
                    Execução de serviços
                </a>
                </li>

                <li>
                <a href="gerenContrato.html"
                    class="text-gray-500 
                            hover:text-blue-500
                            focus:text-blue-500
                            focus:outline-none
                            font-bold">
                    Contratação
                </a>
                </li>

                <li>
                <a href="clientes.html"
                    class="text-gray-500 
                            hover:text-blue-500
                            focus:text-blue-500
                            focus:outline-none
                            font-bold">
                    Clientes
                </a>
                </li>

                <li>
                <a href="usuarios.html"
                    class="text-gray-500 
                            hover:text-blue-500

                            focus:outline-none
                            font-bold">
                    Usuários
                </a>
                </li>

            </ul>
            </div>
    </header>
    <section>
        <div class="flex gap-5 p-5 items-center ">
            <div class="bg-blue-100/10 p-2 rounded-xl w-15 flex items-center">
                <img src="img/cliente.png">
            </div>
                <p class="text-white">Cadastro de Clientes</p>
        </div>
        <p class="text-gray-500 px-5">Gerencie os clientes e seus veículos cadastrados no sistema</p>

        <div class="bg-sky-900/50 border-1 border-gray-700 rounded-xl m-5 p-5 flex flex-col md:flex-row md:justify-between">
            <input class="text-gray-200 p-2 border-1 border-gray-500 rounded-xl mb-4 md:mb-0" type="text" name="buscaCliente" id="buscaCliente" placeholder="Buscar por CPF/CNPJ">
            <div class="flex justify-between md:gap-5 items-center">
                <button class="text-white bg-blue-500 p-2 rounded-lg flex gap-1 items-center w-35 h-10"
                id="btnNovoCliente">
                    + Novo Cliente
                </button>
                <button class="text-white bg-blue-500 p-2 rounded-lg flex gap-1 items-center w-35 h-10">
                    Buscar Cliente
                </button>
            </div>
        </div>

        <!-- MODAL PARA CADASTRO DO CLIENTE -->
        <div id="modalCliente"class="fixed inset-0 bg-black/60 hidden items-center justify-center p-4 z-50">

            <div class="bg-[#0A1932] w-full max-w-3xl max-h-[90vh] overflow-y-auto 
                        p-6 rounded-2xl border border-gray-700 text-white shadow-2xl">

                <h2 class="text-2xl font-bold mb-6 border-b border-gray-700 pb-4">
                    Novo Cliente
                </h2>

                <form class="flex flex-col gap-4" id="novoCliente">

                    <input type="hidden" id="novoClienteId">

                    <!-- ================= CLIENTE ================= -->

                    <div class="grid gap-4">

                        <div class="flex flex-col">
                            <label for="novoClienteNome" class="text-sm text-gray-400 mb-1">
                                Nome Completo *
                            </label>
                            <input type="text"
                                id="novoClienteNome"
                                placeholder="Nome Completo"
                                required
                                class="text-gray-200 p-3 border border-gray-700 rounded-xl bg-[#0F2547] focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                        </div>

                        <div class="grid md:grid-cols-2 gap-4">

                            <div class="flex flex-col">
                                <label for="novoClienteCPFCNPJ" class="text-sm text-gray-400 mb-1">
                                    CPF ou CNPJ *
                                </label>
                                <input type="text"
                                    id="novoClienteCPFCNPJ"
                                    placeholder="000.000.000-00"
                                    required
                                    class="text-gray-200 p-3 border border-gray-700 rounded-xl bg-[#0F2547] focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                            </div>

                            <div class="flex flex-col">
                                <label for="novoClienteTel" class="text-sm text-gray-400 mb-1">
                                    Telefone *
                                </label>
                                <input type="text"
                                    id="novoClienteTel"
                                    placeholder="(00) 00000-0000"
                                    required
                                    class="text-gray-200 p-3 border border-gray-700 rounded-xl bg-[#0F2547] focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                            </div>

                        </div>

                        <div class="flex flex-col">
                            <label for="novoClienteEmail" class="text-sm text-gray-400 mb-1">
                                Email *
                            </label>
                            <input type="email"
                                id="novoClienteEmail"
                                placeholder="email@exemplo.com"
                                required
                                class="text-gray-200 p-3 border border-gray-700 rounded-xl bg-[#0F2547] focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                        </div>

                        <div class="flex flex-col">
                            <label for="novoClienteEnd" class="text-sm text-gray-400 mb-1">
                                Endereço completo
                            </label>
                            <input type="text"
                                id="novoClienteEnd"
                                placeholder="Rua, número - Cidade, Estado"
                                class="text-gray-200 p-3 border border-gray-700 rounded-xl bg-[#0F2547] focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                        </div>

                    </div>
                    

                    <!-- ================= BOTÕES ================= -->

                    <div class="flex flex-col sm:flex-row justify-end gap-3 mt-6">

                        <button type="button"
                                id="fecharModal"
                                class="bg-gray-600 hover:bg-gray-700 transition px-4 py-2 rounded-xl w-full sm:w-auto">
                            Cancelar
                        </button>

                        <button type="submit"
                                class="bg-green-600 hover:bg-green-700 transition px-4 py-2 rounded-xl w-full sm:w-auto font-semibold">
                            Salvar Cliente
                        </button>

                    </div>

                </form>
            </div>
        </div>
                    <!-- ================= VEICULOS ================= -->
        <div id="modalVeiculo"class="fixed inset-0 bg-black/60 hidden items-center justify-center p-4 z-50">

            <div class="bg-[#0A1932] w-full max-w-3xl max-h-[90vh] overflow-y-auto 
                        p-6 rounded-2xl border border-gray-700 text-white shadow-2xl">

                <h2 class="text-2xl font-bold mb-6 border-b border-gray-700 pb-4">
                    Novo Veiculo
                </h2>
                <form class="flex flex-col gap-4" id="novoVeiculo">
                    <input type="hidden" id="novoVeiculoId">
                    <input type="hidden" id="novoVeiculoClienteId">

                    <div class="grid gap-4">

                        <div class="flex flex-col">
                            <label for="novoVeiculoPlaca" class="text-sm text-gray-400 mb-1">
                                Placa *
                            </label>
                            <input type="text"
                                id="novoVeiculoPlaca"
                                placeholder="ABC-1425"
                                required
                                class="text-gray-200 p-3 border border-gray-700 rounded-xl bg-[#0F2547] focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                        </div>

                        <div class="grid md:grid-cols-2 gap-4">

                            <div class="flex flex-col">
                                <label for="novoVeiculoMarca" class="text-sm text-gray-400 mb-1">
                                    Marca *
                                </label>
                                <input type="text"
                                    id="novoVeiculoMarca"
                                    placeholder="Hyundai"
                                    required
                                    class="text-gray-200 p-3 border border-gray-700 rounded-xl bg-[#0F2547] focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                            </div>

                            <div class="flex flex-col">
                                <label for="novoVeiculoModelo" class="text-sm text-gray-400 mb-1">
                                    Modelo *
                                </label>
                                <input type="text"
                                    id="novoVeiculoModelo"
                                    placeholder="HB20"
                                    required
                                    class="text-gray-200 p-3 border border-gray-700 rounded-xl bg-[#0F2547] focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                            </div>

                        </div>

                        <div class="flex flex-col">
                            <label for="novoVeiculoAno" class="text-sm text-gray-400 mb-1">
                                Ano *
                            </label>
                            <input type="number"
                                id="novoVeiculoAno"
                                placeholder="2025"
                                required
                                class="text-gray-200 p-3 border border-gray-700 rounded-xl bg-[#0F2547] focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                        </div>

                        <div class="flex flex-col">
                            <label for="novoVeiculoCor" class="text-sm text-gray-400 mb-1">
                                Cor *
                            </label>
                            <input type="text"
                                id="novoVeiculoCor"
                                placeholder="Branco"
                                class="text-gray-200 p-3 border border-gray-700 rounded-xl bg-[#0F2547] focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                                required>
                        </div>

                        <div class="flex flex-col">
                            <label for="novoVeiculoKm" class="text-sm text-gray-400 mb-1">
                                Quilometragem *
                            </label>
                            <input type="number"
                                id="novoVeiculoKm"
                                placeholder="50000"
                                class="text-gray-200 p-3 border border-gray-700 rounded-xl bg-[#0F2547] focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                                required>
                        </div>

                    </div>
                    <div class="flex flex-col sm:flex-row justify-end gap-3 mt-6">

                        <button type="button"
                                id="deletaVeiculo"
                                class="bg-red-600 hover:bg-gray-700 transition px-4 py-2 rounded-xl w-full sm:w-auto">
                            Deletar
                        </button>

                        <button type="button"
                                id="fecharModalVeiculo"
                                class="bg-gray-600 hover:bg-gray-700 transition px-4 py-2 rounded-xl w-full sm:w-auto">
                            Cancelar
                        </button>

                        <button type="submit"
                                class="bg-green-600 hover:bg-green-700 transition px-4 py-2 rounded-xl w-full sm:w-auto font-semibold">
                            Salvar Veiculo
                        </button>
                    </div>
                </form>
            </div>
        </div>

    <div  id="listaClientes">
        
    </div>

    </section>
    <script type="module" src="js/clientes/apiClientes.js" ></script>
    <script type="module" src="js/clientes/uiClientes.js" ></script>
    <script type="module" src="js/clientes/mainClientes.js" ></script>
</body>
</html>
